services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: ${BASE_PATH:-/}
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: aura-frontend:latest
    container_name: aura-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
    image: aura-backend:latest
    container_name: aura-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aura}:${POSTGRES_PASSWORD:-aurapass}@postgres:5432/${POSTGRES_DB:-auradb}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOADS_DIR: /uploads
      PORT: 3000
    volumes:
      - uploads_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurapass}
      POSTGRES_DB: ${POSTGRES_DB:-auradb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aura} -d ${POSTGRES_DB:-auradb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data:
