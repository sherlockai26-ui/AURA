# ───────────────────────────────────────────────────────────────────────
# nginx config para servir AURA como SPA estática.
# Pensado para correr DENTRO del contenedor (puerto 80). El reverse proxy
# del host (nginx/traefik/caddy) hace TLS y dirige el dominio aquí.
# ───────────────────────────────────────────────────────────────────────

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: cualquier ruta no resuelta cae a index.html y React
    # Router decide la pantalla (no GitHub Pages 404 trick aquí).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados por Vite (hash en nombre): cache largo + immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Iconos PWA y SVG: cache medio
    location ~* \.(png|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service worker, manifest y registerSW: revalidar siempre para que
    # un deploy nuevo sustituya al SW viejo en el primer refresh.
    location ~ ^/(sw\.js|registerSW\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Compresión
    gzip                on;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Cabeceras de seguridad básicas
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-Frame-Options        "SAMEORIGIN"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Errores
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
