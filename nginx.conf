# nginx config — sirve AURA SPA + proxea /api/ y /uploads/ al backend.
# Corre DENTRO del contenedor (puerto 80).

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Docker DNS resolver (necesario para proxy_pass con variables)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API: proxy al backend Express ──────────────────────────────────
    location /api/ {
        set $backend_host backend;
        proxy_pass         http://$backend_host:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Evitar que el navegador cachee respuestas de API
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires       "0"                                   always;
        # Ocultar ETag y Last-Modified del backend para impedir 304
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;

        # Si el backend no responde, devuelve 503 limpio
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_down;
    }

    # ── Uploads: archivos subidos por usuarios ─────────────────────────
    location /uploads/ {
        set $backend_host backend;
        proxy_pass         http://$backend_host:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_read_timeout 10s;
        # Uploads tienen nombres únicos (uuid/hash): cache corto es seguro
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Respuesta JSON cuando el backend está caído
    location @backend_down {
        default_type application/json;
        return 503 '{"error":"El servidor no está disponible. Intenta más tarde."}';
    }

    # ── SPA fallback ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets versionados por Vite (hash en nombre): cache largo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Iconos PWA
    location ~* \.(png|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Service worker y manifest: revalidar siempre
    location ~ ^/(sw\.js|registerSW\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Compresión
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json image/svg+xml;

    # Seguridad básica
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-Frame-Options        "SAMEORIGIN"         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
